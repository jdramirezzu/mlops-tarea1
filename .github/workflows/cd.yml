name: CD

on:
  push:
    branches: [main]

jobs:
  build-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}:latest

  smoke-test:
    name: Smoke Test (Staging)
    runs-on: ubuntu-latest
    needs: build-push
    permissions:
      packages: read
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Run container and verify endpoint
        run: |
          docker run -d --name staging -p 5000:5000 \
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          sleep 5
          curl --fail --retry 3 http://localhost:5000/ \
            || (docker logs staging && exit 1)
          docker stop staging

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: smoke-test
    environment: production
    steps:
      - name: Deploy image to production server
        run: |
          echo "Deploying ghcr.io/${{ github.repository }}:${{ github.sha }}"
